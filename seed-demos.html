  const val = input.value.trim();
  if (!val) return;
  const feed = document.querySelector('.trash-feed');
  const msg = document.createElement('div');
  msg.className = 'trash-msg';
  msg.innerHTML = \`<div class="trash-author">You</div><div class="trash-text">\${val}</div><div class="trash-time">just now</div>\`;
  feed.appendChild(msg);
  feed.scrollTop = feed.scrollHeight;
  input.value = '';
}`

@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
:root { --sky: #0f172a; --font: 'Nunito', system-ui, sans-serif; }
html, body { height: 100%; overflow: hidden; background: var(--sky); font-family: var(--font); }
#game-wrap { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; }
#hud { flex-shrink: 0; height: 52px; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; font-size: 1rem; font-weight: 800; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 10; }
.hud-title { font-size: 0.85rem; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
#canvas { flex: 1; display: block; cursor: none; touch-action: none; }
.overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(10,10,30,0.88); backdrop-filter: blur(8px); z-index: 20; }
.overlay-box { text-align: center; padding: 2.5rem 2rem; border-radius: 24px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); max-width: 340px; }
.overlay-star { font-size: 3rem; margin-bottom: 0.75rem; animation: bounce 1s ease infinite alternate; }
@keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
.overlay-box h1 { font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 0.75rem; }
.overlay-box p { font-size: 0.88rem; color: rgba(255,255,255,0.65); margin-bottom: 0.5rem; }
.overlay-box p.small { font-size: 0.75rem; color: rgba(255,255,255,0.35); margin-bottom: 1.5rem; }
.score-display { font-size: 1.25rem; font-weight: 900; color: #fbbf24; margin: 0.75rem 0 1.5rem; }
button { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none; border-radius: 12px; padding: 0.75rem 2rem; font-family: var(--font); font-size: 1rem; font-weight: 900; cursor: pointer; transition: transform 0.15s, opacity 0.15s; box-shadow: 0 0 24px rgba(99,102,241,0.5); }
button:hover { transform: scale(1.05); opacity: 0.9; }`,
        js: `const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let stars = [], particles = [], score = 0, lives = 3, gameRunning = false;
let basketX = 0, basketW = 100;
const COLORS = ['#fbbf24','#f472b6','#60a5fa','#34d399','#a78bfa','#fb923c'];

function resize() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
  basketX = canvas.width / 2 - basketW / 2;
}
window.addEventListener('resize', resize);

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  basketX = e.clientX - r.left - basketW / 2;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  basketX = e.touches[0].clientX - r.left - basketW / 2;
}, { passive: false });

function spawnStar() {
  stars.push({
    x: Math.random() * (canvas.width - 30) + 15,
    y: -20,
    r: Math.random() * 12 + 12,
    speed: Math.random() * (1.5 + score * 0.02) + 1.5,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
    rot: 0,
    rotSpeed: (Math.random() - 0.5) * 0.1
  });
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x, y, color,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6 - 2,
      life: 1
    });
  }
}

function drawStar(x, y, r, color, rot) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    const b = ((i * 4 + 2) * Math.PI) / 5 - Math.PI / 2;
    i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    ctx.lineTo(Math.cos(b)*(r*0.4), Math.sin(b)*(r*0.4));
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.shadowBlur = 18;
  ctx.shadowColor = color;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBasket(bx) {
  const bh = 18, br = 14, by = canvas.height - 40;
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(bx + basketW, by);
  ctx.lineTo(bx + basketW - br, by + bh);
  ctx.lineTo(bx + br, by + bh);
  ctx.closePath();
  ctx.fillStyle = 'rgba(139,92,246,0.85)';
  ctx.shadowBlur = 20;
  ctx.shadowColor = '#8b5cf6';
  ctx.fill();
  ctx.restore();
}

let spawnTimer = 0;
function loop() {
  if (!gameRunning) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw starfield bg
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const by = canvas.height - 40;
  const bx = Math.max(0, Math.min(basketX, canvas.width - basketW));

  spawnTimer++;
  if (spawnTimer > Math.max(30 - score, 10)) { spawnStar(); spawnTimer = 0; }

  // Stars
  stars = stars.filter(s => {
    s.y += s.speed;
    s.rot += s.rotSpeed;
    // Catch check
    if (s.y + s.r > by && s.y - s.r < by + 18 && s.x > bx && s.x < bx + basketW) {
      spawnParticles(s.x, s.y, s.color);
      score++;
      document.getElementById('score').textContent = score;
      if (score >= 30) { endGame(true); return false; }
      return false;
    }
    if (s.y > canvas.height + 20) {
      lives--;
      document.getElementById('lives').textContent = '❤️'.repeat(Math.max(lives,0));
      if (lives <= 0) { endGame(false); return false; }
      return false;
    }
    drawStar(s.x, s.y, s.r, s.color, s.rot);
    return true;
  });

  drawBasket(bx);

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
    return p.life > 0;
  });

  requestAnimationFrame(loop);
}

function startGame() {
  stars = []; particles = []; score = 0; lives = 3; spawnTimer = 0; gameRunning = true;
  document.getElementById('score').textContent = '0';
  document.getElementById('lives').textContent = '❤️❤️❤️';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('gameOverlay').style.display = 'none';
  resize();
  loop();
}

function endGame(won) {
  gameRunning = false;
  const ov = document.getElementById('gameOverlay');
  document.getElementById('resultIcon').textContent = won ? '🏆' : '💫';
  document.getElementById('resultTitle').textContent = won ? 'You Win!' : 'Game Over';
  document.getElementById('resultMsg').textContent = won ? 'You caught all 30 stars!' : 'Better luck next time!';
  document.getElementById('finalScore').textContent = score;
  ov.style.display = 'flex';
}`
      }
    ];

    async function seed() {
      const btn = document.getElementById('seedBtn');
      btn.disabled = true;

      const { data: { session } } = await sb.auth.getSession();
      if (!session) { log('Not logged in — redirecting to login…', 'err'); setTimeout(() => window.location.href = '/login', 1500); return; }

      const { data: profile } = await sb.from('profiles').select('handle').eq('id', session.user.id).single();
      if (!profile) { log('Could not load your profile.', 'err'); btn.disabled = false; return; }

      const handle = profile.handle.replace('.postmarq', '');
      log(`Logged in as <strong>${handle}</strong>`);

      for (const demo of DEMOS) {
        log(`Creating <strong>${demo.slug}</strong>…`);
        const { error } = await sb.from('rooms').upsert(
          { user_id: session.user.id, username: handle, room_name: demo.slug, html: demo.html, css: demo.css, js: demo.js, published: true },
          { onConflict: 'username,room_name' }
        );
        if (error) {
          log(`✗ ${demo.slug}: ${error.message}`, 'err');
        } else {
          log(`<span class="ok">✓ ${demo.slug} created → <a href="/${handle}/${demo.slug}" style="color:#4ab5aa" target="_blank">postmarq.org/${handle}/${demo.slug}</a></span>`);
        }
      }

      log('');
      log('<span class="ok">All done! Head to <a href="/home" style="color:#4ab5aa">My Post</a> to see your new sites.</span>');
    }
  </script>
</body>
