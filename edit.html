<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit My Post — Postmarq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a20;
      --surface:  #222228;
      --surface2: #2a2a32;
      --border:   rgba(255,255,255,0.08);
      --lavender: #9b8fd4;
      --teal:     #4ab5aa;
      --amber:    #e8992a;
      --ink:      rgba(255,255,255,0.88);
      --ink2:     rgba(255,255,255,0.5);
      --ink3:     rgba(255,255,255,0.25);
      --font:     'Nunito', system-ui, sans-serif;
      --radius:   10px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ── */
    .top-bar {
      flex-shrink: 0;
      height: 46px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .top-bar-logo {
      font-size: 0.95rem;
      font-weight: 900;
      background: linear-gradient(90deg, var(--lavender), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
      margin-right: 0.25rem;
    }
    .top-bar-sep { color: var(--ink3); }
    .top-bar-title { font-size: 0.78rem; font-weight: 700; color: var(--ink2); }
    .top-bar-url {
      font-size: 0.72rem; font-weight: 600; color: var(--ink3);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.2rem 0.75rem;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.02em;
    }
    .top-bar-url span { color: var(--teal); }
    .spacer { flex: 1; }
    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink3); transition: background 0.3s;
    }
    .status-dot.saved  { background: var(--teal); }
    .status-dot.saving { background: var(--amber); }
    .status-dot.error  { background: #e05a5a; }
    .status-text {
      font-size: 0.68rem; font-weight: 700; color: var(--ink3);
      transition: color 0.3s;
    }
    .status-text.saved  { color: var(--teal); }
    .status-text.saving { color: var(--amber); }
    .status-text.error  { color: #e05a5a; }

    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.38rem 1rem; border-radius: var(--radius);
      font-family: var(--font); font-size: 0.78rem; font-weight: 800;
      border: none; cursor: pointer; transition: opacity 0.15s, transform 0.15s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-save {
      background: linear-gradient(135deg, var(--lavender), var(--teal));
      color: #fff;
    }
    .btn-preview-link {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--ink2);
      text-decoration: none;
    }
    .btn-home {
      background: none;
      border: 1px solid var(--border);
      color: var(--ink3);
      font-size: 0.7rem;
    }

    /* ── Main Split ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    /* ── Editor Side ── */
    .editor-side {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .tab-bar {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      padding: 0 1.25rem;
      height: 38px;
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--ink3);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tab-btn:hover { color: var(--ink2); }
    .tab-btn.active { color: var(--lavender); border-bottom-color: var(--lavender); }

    .tab-hint {
      margin-left: auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      font-size: 0.62rem;
      color: var(--ink3);
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .tab-hint kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'Courier New', monospace;
      font-size: 0.65rem;
      color: var(--ink2);
      margin-left: 4px;
    }

    .pane-wrap { flex: 1; position: relative; overflow: hidden; }
    .pane {
      display: none;
      position: absolute; inset: 0;
    }
    .pane.active { display: block; }
    .pane textarea {
      width: 100%; height: 100%;
      background: var(--bg);
      color: #d4d4d4;
      font-family: 'Courier New', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.65;
      border: none;
      outline: none;
      resize: none;
      padding: 1.25rem;
      tab-size: 2;
    }
    .pane textarea::placeholder { color: var(--ink3); }
    .pane textarea:focus { background: rgba(255,255,255,0.015); }

    /* ── AI Prompt Drawer ── */
    .ai-drawer {
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .ai-drawer-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem 0;
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
    }
    .ai-drawer-header span { color: var(--lavender); }
    .ai-row {
      display: flex;
      gap: 0.5rem;
      padding: 0.45rem 1rem 0.65rem;
    }
    .ai-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.45rem 0.85rem;
      font-family: var(--font);
      font-size: 0.8rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.15s;
    }
    .ai-input::placeholder { color: var(--ink3); }
    .ai-input:focus { border-color: rgba(155,143,212,0.45); }
    .btn-ai {
      background: linear-gradient(135deg, rgba(155,143,212,0.9), rgba(74,181,170,0.9));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.45rem 1rem;
      font-family: var(--font);
      font-size: 0.78rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-ai:hover { opacity: 0.88; }
    .ai-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding: 0 1rem 0.65rem;
    }
    .ai-chip {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--ink3);
      cursor: pointer;
      transition: all 0.15s;
    }
    .ai-chip:hover {
      color: var(--lavender);
      border-color: rgba(155,143,212,0.4);
      background: rgba(155,143,212,0.08);
    }

    /* ── Preview Side ── */
    .preview-side {
      display: flex;
      flex-direction: column;
      background: #fff;
      overflow: hidden;
    }
    .preview-bar {
      flex-shrink: 0;
      height: 38px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.75rem;
    }
    .preview-bar-label {
      font-size: 0.62rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink3);
    }
    .preview-url-pill {
      flex: 1;
      font-family: 'Courier New', monospace;
      font-size: 0.68rem;
      color: var(--ink3);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.18rem 0.75rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .preview-url-pill span { color: var(--teal); }
    .refresh-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--ink3);
      font-size: 1rem;
      padding: 0;
      line-height: 1;
      transition: color 0.15s, transform 0.2s;
    }
    .refresh-btn:hover { color: var(--teal); transform: rotate(90deg); }
    .preview-frame {
      flex: 1;
      border: none;
      background: #fff;
    }

    /* ── Prompt generated overlay ── */
    .prompt-result {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(26,26,32,0.97);
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }
    .prompt-result.show { display: flex; }
    .pr-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .pr-title { font-size: 0.78rem; font-weight: 800; color: var(--lavender); }
    .pr-actions { display: flex; gap: 0.5rem; margin-left: auto; }
    .btn-apply {
      background: linear-gradient(135deg, var(--lavender), var(--teal));
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 0.35rem 0.9rem;
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 800;
      cursor: pointer;
    }
    .btn-discard {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.35rem 0.9rem;
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--ink3);
      cursor: pointer;
    }
    .pr-content {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      color: #d4d4d4;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    /* ── Loading/empty states ── */
    .loading-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--ink3);
    }
    .loading-spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--lavender);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Resize handle ── */
    .main { gap: 0; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="top-bar-logo">postmarq</div>
    <div class="top-bar-sep">/</div>
    <div class="top-bar-title">Edit My Post</div>
    <div class="top-bar-url" id="topUrl"><span>loading…</span></div>
    <div class="spacer"></div>
    <div class="status-dot" id="statusDot"></div>
    <div class="status-text" id="statusText">—</div>
    <a class="btn btn-home" href="my-post.html">← Home</a>
    <a class="btn btn-preview-link" id="previewLink" href="#" target="_blank">View Live ↗</a>
    <button class="btn btn-save" onclick="savePost()">Save</button>
  </div>

  <!-- Main Split -->
  <div class="main">

    <!-- Editor Side -->
    <div class="editor-side">

      <!-- Tab Bar -->
      <div class="tab-bar">
        <button class="tab-btn active" id="tab-html" onclick="switchTab('html')">HTML</button>
        <button class="tab-btn" id="tab-css" onclick="switchTab('css')">CSS</button>
        <button class="tab-btn" id="tab-js" onclick="switchTab('js')">JS</button>
        <div class="tab-hint">Auto-preview on edit <kbd>⌘S</kbd> to save</div>
      </div>

      <!-- Panes -->
      <div class="pane-wrap">
        <div class="pane active" id="pane-html">
          <textarea id="code-html" placeholder="<!-- Paste Claude-generated HTML here -->" spellcheck="false" onInput="schedulePreview()"></textarea>
        </div>
        <div class="pane" id="pane-css">
          <textarea id="code-css" placeholder="/* CSS here */" spellcheck="false" oninput="schedulePreview()"></textarea>
        </div>
        <div class="pane" id="pane-js">
          <textarea id="code-js" placeholder="// JavaScript here" spellcheck="false" oninput="schedulePreview()"></textarea>
        </div>

        <!-- AI Prompt Result Overlay -->
        <div class="prompt-result" id="promptResult">
          <div class="pr-header">
            <div class="pr-title">✦ Claude suggestion</div>
            <div class="pr-actions">
              <button class="btn-apply" onclick="applyPromptResult()">Apply to HTML</button>
              <button class="btn-discard" onclick="discardPromptResult()">Discard</button>
            </div>
          </div>
          <div class="pr-content" id="prContent"></div>
        </div>
      </div>

      <!-- AI Prompt Drawer -->
      <div class="ai-drawer">
        <div class="ai-drawer-header">✦ <span>Ask Claude</span> — describe what you want on your page</div>
        <div class="ai-row">
          <input class="ai-input" id="aiInput" placeholder="e.g. Add a dark-mode about me section with my photo on the left…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendPrompt()}" />
          <button class="btn-ai" onclick="sendPrompt()">Generate</button>
        </div>
        <div class="ai-chips">
          <span class="ai-chip" onclick="fillPrompt('Give me a simple dark landing page with my name and a short bio')">Dark landing page</span>
          <span class="ai-chip" onclick="fillPrompt('Add a links section with Instagram, LinkedIn, and a portfolio button')">Social links section</span>
          <span class="ai-chip" onclick="fillPrompt('Make a colorful grid of my favorite things with emoji icons')">Favorite things grid</span>
          <span class="ai-chip" onclick="fillPrompt('Add a minimal now page — what I\'m reading, watching, and working on')">Now page</span>
          <span class="ai-chip" onclick="fillPrompt('Style this page to look like a retro 90s website with a dark background and neon colors')">Retro 90s style</span>
          <span class="ai-chip" onclick="fillPrompt('Add a photo gallery section that displays images in a masonry grid')">Photo gallery</span>
        </div>
      </div>

    </div><!-- /editor-side -->

    <!-- Preview Side -->
    <div class="preview-side">
      <div class="preview-bar">
        <div class="preview-bar-label">Live Preview</div>
        <div class="preview-url-pill" id="previewUrlPill"><span>postmarq.org/</span><span id="previewHandle">…</span></div>
        <button class="refresh-btn" onclick="renderPreview()" title="Refresh preview">↻</button>
      </div>
      <iframe class="preview-frame" id="previewFrame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

  </div><!-- /main -->


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://udlbdccvspxqlzizpkda.supabase.co',
      'sb_publishable_co1yq79BF8oR9Mg651DG5w_ESuACdqn'
    );

    let currentUser = null;
    let postUsername = '';
    let previewTimer = null;
    let isDirty = false;

    /* ── Tab switching ── */
    function switchTab(tab) {
      ['html','css','js'].forEach(t => {
        document.getElementById('tab-' + t).classList.toggle('active', t === tab);
        document.getElementById('pane-' + t).classList.toggle('active', t === tab);
      });
    }

    /* ── Live preview ── */
    function schedulePreview() {
      isDirty = true;
      setStatus('', '');
      clearTimeout(previewTimer);
      previewTimer = setTimeout(renderPreview, 600);
    }

    function renderPreview() {
      const html = document.getElementById('code-html').value;
      const css  = document.getElementById('code-css').value;
      const js   = document.getElementById('code-js').value;
      const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}</style></head><body>${html}<script>${js}<\/script></body></html>`;
      const frame = document.getElementById('previewFrame');
      frame.srcdoc = doc;
    }

    /* ── Status ── */
    function setStatus(state, text) {
      const dot  = document.getElementById('statusDot');
      const label = document.getElementById('statusText');
      dot.className   = 'status-dot'   + (state ? ' ' + state : '');
      label.className = 'status-text'  + (state ? ' ' + state : '');
      label.textContent = text;
    }

    /* ── Save ── */
    async function savePost() {
      if (!currentUser) return;
      setStatus('saving', 'Saving…');
      const html = document.getElementById('code-html').value;
      const css  = document.getElementById('code-css').value;
      const js   = document.getElementById('code-js').value;

      const { error } = await sb
        .from('posts')
        .upsert({ user_id: currentUser.id, username: postUsername, html, css, js }, { onConflict: 'user_id' });

      if (error) {
        setStatus('error', 'Save failed');
        console.error(error);
      } else {
        setStatus('saved', 'Saved');
        isDirty = false;
        setTimeout(() => { if (!isDirty) setStatus('', '—'); }, 3000);
      }
    }

    /* ── Keyboard shortcut ── */
    document.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        savePost();
      }
    });

    /* ── AI Prompt (client-side — generates a prompt for Claude Code) ── */
    function fillPrompt(text) {
      document.getElementById('aiInput').value = text;
      document.getElementById('aiInput').focus();
    }

    function sendPrompt() {
      const input = document.getElementById('aiInput').value.trim();
      if (!input) return;

      const currentHtml = document.getElementById('code-html').value.trim();
      const contextNote = currentHtml
        ? `\n\nMy current HTML:\n\`\`\`html\n${currentHtml.slice(0, 2000)}\n\`\`\``
        : '';

      const prompt = `I'm editing my personal Postmarq page. ${input}${contextNote}\n\nReturn only the complete HTML (include any CSS inside a <style> tag in the <head>). No explanation needed.`;

      document.getElementById('prContent').textContent = prompt;
      document.getElementById('promptResult').classList.add('show');

      // Copy to clipboard so user can paste into Claude Code
      navigator.clipboard.writeText(prompt).catch(() => {});
    }

    function applyPromptResult() {
      // User will paste result from Claude into the HTML editor
      document.getElementById('promptResult').classList.remove('show');
      switchTab('html');
      document.getElementById('code-html').focus();
      const hint = document.createElement('div');
      hint.style.cssText = 'position:fixed;bottom:1rem;right:1rem;background:rgba(155,143,212,0.9);color:#fff;font-size:0.78rem;font-weight:700;padding:0.5rem 1rem;border-radius:8px;z-index:9999;pointer-events:none;';
      hint.textContent = '← Paste Claude\'s code here';
      document.body.appendChild(hint);
      setTimeout(() => hint.remove(), 3000);
    }

    function discardPromptResult() {
      document.getElementById('promptResult').classList.remove('show');
    }

    /* ── Warn on unsaved changes ── */
    window.addEventListener('beforeunload', e => {
      if (isDirty) { e.preventDefault(); e.returnValue = ''; }
    });

    /* ── Init ── */
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      currentUser = session.user;

      // Load profile for handle
      const { data: profile } = await sb.from('profiles')
        .select('handle, full_name')
        .eq('id', currentUser.id)
        .single();

      const handle = profile?.handle || currentUser.email.split('@')[0] + '.postmarq';
      postUsername  = handle.replace('.postmarq', '');

      document.getElementById('topUrl').innerHTML = `<span style="color:var(--teal)">postmarq.org/</span>${postUsername}`;
      document.getElementById('previewHandle').textContent = postUsername;
      document.getElementById('previewLink').href = `https://postmarq.org/${postUsername}`;

      // Load existing post content
      const { data: post } = await sb.from('posts')
        .select('html, css, js')
        .eq('user_id', currentUser.id)
        .single();

      if (post) {
        document.getElementById('code-html').value = post.html || '';
        document.getElementById('code-css').value  = post.css  || '';
        document.getElementById('code-js').value   = post.js   || '';
      }

      renderPreview();
      setStatus('saved', 'Up to date');
      setTimeout(() => setStatus('', '—'), 2000);
    }

    init();
  </script>

</body>
</html>
