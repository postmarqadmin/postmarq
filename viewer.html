<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postmarq</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Tahoma, Arial, sans-serif; background: #ECE9D8; min-height: 100vh; }

    .state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 1rem;
      font-size: 13px; color: #444;
    }
    .state-title { font-size: 16px; font-weight: bold; color: #0A246A; }
    .xp-btn {
      padding: 4px 16px; font-family: Tahoma, Arial, sans-serif; font-size: 11px;
      background: linear-gradient(180deg, #F8F6F2 0%, #ECE9D8 50%, #DDD9C8 100%);
      border: 2px solid; cursor: pointer;
      border-color: #fff #808080 #808080 #fff;
    }

    #post-root { min-height: 100vh; }

    /* ── Always-visible logout pill ── */
    #logout-pill {
      display: none;
      position: fixed; bottom: 12px; right: 12px; z-index: 99999;
      background: #ECE9D8; border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      padding: 4px 10px; font-family: Tahoma, Arial, sans-serif;
      font-size: 11px; color: #333; gap: 8px; align-items: center;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    #logout-pill.visible { display: flex; }
    #logout-pill button {
      background: none; border: none; color: #316AC5;
      text-decoration: underline; cursor: pointer;
      font-size: 11px; font-family: Tahoma, Arial, sans-serif; padding: 0;
    }

    /* ── Edit toolbar ── */
    #edit-toolbar {
      display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: linear-gradient(180deg, #5896E8 0%, #1A54B2 50%, #2870D0 100%);
      border-bottom: 2px solid #1040A0;
      padding: 4px 10px; gap: 8px; align-items: center;
      font-family: Tahoma, Arial, sans-serif; font-size: 11px; color: white;
    }
    #edit-toolbar.visible { display: flex; }
    #edit-toolbar span { font-weight: bold; text-shadow: 0 1px 1px rgba(0,0,60,0.5); }

    /* ── Visitor bar (logged in, not owner) ── */
    #visitor-bar {
      display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #DDD9C8; border-bottom: 2px solid #808080;
      padding: 3px 10px; gap: 8px; align-items: center;
      font-family: Tahoma, Arial, sans-serif; font-size: 11px; color: #333;
    }
    #visitor-bar.visible { display: flex; }
    .vb-link { color: #316AC5; text-decoration: underline; cursor: pointer; background: none; border: none; font-size: 11px; font-family: Tahoma, Arial, sans-serif; }
    .tb-btn {
      padding: 3px 10px; font-family: Tahoma, Arial, sans-serif; font-size: 11px;
      font-weight: bold; cursor: pointer;
      background: linear-gradient(180deg, #6AAAF8 0%, #2A68D0 50%, #3A78DC 100%);
      border: 2px solid; color: white;
      border-color: #8ABCFA #1040A0 #1040A0 #8ABCFA;
      text-shadow: 0 1px 1px rgba(0,0,60,0.5);
    }
    .tb-btn.danger {
      background: linear-gradient(180deg, #F87070 0%, #C83030 50%, #D84040 100%);
      border-color: #FA8888 #A02020 #A02020 #FA8888;
    }
    .tb-spacer { flex: 1; }
    .tb-status { font-size: 10px; opacity: 0.8; font-style: italic; }

    /* ── Room nav (owner only) ── */
    #room-nav {
      display: none; position: fixed; top: 36px; left: 0; right: 0; z-index: 9998;
      background: #DDD9C8; border-bottom: 1px solid #808080;
      padding: 3px 10px; gap: 4px; align-items: center; flex-wrap: wrap;
      font-family: Tahoma, Arial, sans-serif; font-size: 11px;
    }
    #room-nav.visible { display: flex; }
    .room-tab {
      padding: 2px 10px; cursor: pointer; font-size: 11px;
      background: #ECE9D8; border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
    }
    .room-tab.active {
      background: white; border-color: #808080 #fff #fff #808080;
      font-weight: bold; color: #0A246A;
    }
    .room-tab-add {
      padding: 2px 8px; cursor: pointer; font-size: 11px; color: #316AC5;
      background: none; border: 1px dashed #808080;
    }

    /* ── Split-pane editor ── */
    #editor-panel {
      display: none; position: fixed; inset: 0; z-index: 10000;
      flex-direction: column; background: #1E1E1E;
    }
    #editor-panel.visible { display: flex; }
    #editor-topbar {
      display: flex; align-items: center; gap: 8px;
      background: #2D2D2D; border-bottom: 2px solid #1040A0;
      padding: 5px 12px; flex-shrink: 0;
      font-family: Tahoma, Arial, sans-serif; font-size: 11px; color: #CCC;
    }
    #editor-topbar span { font-weight: bold; color: #fff; }
    .ed-btn {
      padding: 3px 12px; font-family: Tahoma, Arial, sans-serif; font-size: 11px;
      font-weight: bold; cursor: pointer; color: white;
      background: linear-gradient(180deg, #6AAAF8 0%, #2A68D0 50%, #3A78DC 100%);
      border: 2px solid; border-color: #8ABCFA #1040A0 #1040A0 #8ABCFA;
      text-shadow: 0 1px 1px rgba(0,0,60,0.5);
    }
    .ed-btn.danger {
      background: linear-gradient(180deg, #F87070 0%, #C83030 50%, #D84040 100%);
      border-color: #FA8888 #A02020 #A02020 #FA8888;
    }
    #ed-status { font-size: 10px; opacity: 0.8; font-style: italic; margin-left: 4px; }
    #editor-split {
      display: flex; flex: 1; overflow: hidden;
    }
    #editor-code {
      width: 50%; display: flex; flex-direction: column; border-right: 3px solid #1040A0;
    }
    #editor-code textarea {
      flex: 1; padding: 12px; background: #1E1E1E; color: #D4D4D4;
      font-family: 'Courier New', monospace; font-size: 12px;
      border: none; outline: none; resize: none; line-height: 1.6; tab-size: 2;
    }
    #editor-preview {
      flex: 1; background: #fff; position: relative;
    }
    #editor-preview iframe {
      width: 100%; height: 100%; border: none; display: block;
    }
    #ed-divider {
      width: 5px; background: #1040A0; cursor: col-resize; flex-shrink: 0;
    }
    #ed-divider:hover { background: #4A88E8; }

    /* ── Back to profile pill ── */
    #back-pill {
      display: none; position: fixed; bottom: 14px; left: 14px; z-index: 9998;
      background: #ECE9D8; border: 2px solid;
      border-color: #fff #808080 #808080 #fff;
      padding: 4px 12px; font-family: Tahoma, Arial, sans-serif;
      font-size: 11px; color: #316AC5; text-decoration: none;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.25);
    }
    #back-pill:hover { background: #DDD9C8; }
    #back-pill.visible { display: block; }
  </style>
</head>
<body>

<a id="back-pill" href="#">← back</a>

<div id="logout-pill">
  <span id="pill-username"></span>
  <button onclick="signOut()">Sign out</button>
</div>

<div id="visitor-bar">
  <span>You're signed in as <strong id="visitorUsername"></strong></span>
  <div class="tb-spacer"></div>
  <button class="vb-link" id="myPostLink">Go to my Post</button>
  &nbsp;·&nbsp;
  <button class="vb-link" onclick="signOut()">Sign out</button>
</div>

<div id="edit-toolbar">
  <span>✏️ Edit Mode</span>
  <button class="tb-btn" onclick="toggleEditor()">Open Editor</button>
  <button class="tb-btn" onclick="addRoom()">+ New Room</button>
  <button class="tb-btn danger" onclick="exitEditMode()">Exit Edit</button>
  <button class="tb-btn danger" onclick="signOut()">Sign Out</button>
  <div class="tb-spacer"></div>
</div>

<div id="room-nav"></div>
<div id="post-root"></div>

<div id="editor-panel">
  <div id="editor-topbar">
    <span>✏️ Builder Editor</span>
    <button class="ed-btn" onclick="saveContent()">Save</button>
    <button class="ed-btn danger" onclick="closeEditor()">✕ Close</button>
    <span id="ed-status"></span>
  </div>
  <div id="editor-split">
    <div id="editor-code">
      <textarea id="code-html" placeholder="<!-- Write your full HTML here. Include <style> and <script> tags inline. -->"></textarea>
    </div>
    <div id="ed-divider"></div>
    <div id="editor-preview">
      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://udlbdccvspxqlzizpkda.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_co1yq79BF8oR9Mg651DG5w_ESuACdqn';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const DEFAULT_POST_HTML = `
<style>
  body { font-family: Tahoma, Arial, sans-serif; background: #ECE9D8; margin: 0; padding: 2rem; }
  .post-name { font-size: 28px; font-weight: bold; color: #0A246A; max-width: 680px; margin: 0 auto 0.4rem; }
  .post-bio  { font-size: 13px; color: #555; max-width: 680px; margin: 0 auto 2rem; }
  .post-card {
    max-width: 680px; margin: 0 auto; padding: 1.5rem;
    background: white; border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    font-size: 13px; color: #333; line-height: 1.6;
  }
  .post-card h2 { font-size: 14px; color: #0A246A; margin-bottom: 0.75rem; }
  .stamp-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .stamp { padding: 4px 12px; font-size: 11px; cursor: pointer; background: #ECE9D8; border: 2px solid; border-color: #fff #808080 #808080 #fff; }
</style>
<div class="post-name" id="post-username">Your Post</div>
<div class="post-bio">Welcome to my place on the internet.</div>
<div class="post-card">
  <h2>Hello, neighbor.</h2>
  <p>This is my Post. Edit this page to make it yours — paste in code, write it yourself, or remix it any way you like.</p>
  <div class="stamp-row">
    <button class="stamp">📮 Stamp</button>
    <button class="stamp">🔁 Loop</button>
  </div>
</div>`;

  const DEFAULT_ROOM_HTML = (roomName) => `
<style>
  body { font-family: Tahoma, Arial, sans-serif; background: #ECE9D8; margin: 0; padding: 2rem; }
  .room-title { font-size: 22px; font-weight: bold; color: #0A246A; max-width: 680px; margin: 0 auto 1.5rem; text-transform: capitalize; }
  .room-card { max-width: 680px; margin: 0 auto; padding: 1.5rem; background: white; border: 2px solid; border-color: #fff #808080 #808080 #fff; font-size: 13px; color: #333; line-height: 1.6; }
</style>
<div class="room-title">${roomName}</div>
<div class="room-card">
  <p>This is your ${roomName}. Make it whatever you want — paste in code from Claude, write it yourself, or start fresh.</p>
</div>`;

  let username = '';
  let currentRoom = null;
  let postData = null;
  let roomsData = [];
  let isOwner = false;
  let currentContent = { html: '', css: '', js: '' };
  let pendingSession = null;

  // Register IMMEDIATELY — before any awaits — so we never miss the token event
  sb.auth.onAuthStateChange((event, session) => {
    if (!session) return;
    if (postData) {
      showOwnerUI(session, postData);
    } else {
      pendingSession = session;
    }
  });

  async function init() {
    // Read username and room from path: /davemichael or /davemichael/living-room
    const segments = window.location.pathname.replace(/^\//, '').split('/');
    username = segments[0];
    currentRoom = segments[1] || null;

    if (!username || username === 'viewer.html' || username === 'index.html') {
      window.location.replace('/'); return;
    }

    document.title = username + (currentRoom ? '/' + currentRoom : '') + ' — Postmarq';

    if (currentRoom) {
      const pill = document.getElementById('back-pill');
      pill.href = '/' + username;
      pill.textContent = '← ' + username;
      pill.classList.add('visible');
    }

    // 1. Fetch page data
    const { data: post, error } = await sb.from('pages').select('*').eq('username', username).single();
    if (error || !post) { showNotFound(); return; }
    postData = post;

    const { data: rooms } = await sb.from('rooms').select('*').eq('username', username);
    roomsData = rooms || [];

    if (currentRoom) {
      const room = roomsData.find(r => r.room_name === currentRoom);
      if (!room) { showRoomNotFound(); return; }
      currentContent = { html: room.html || DEFAULT_ROOM_HTML(currentRoom), css: room.css || '', js: room.js || '' };
    } else {
      currentContent = { html: post.html || DEFAULT_POST_HTML, css: post.css || '', js: post.js || '' };
    }
    renderContent(currentContent, post.display_name || username);

    // 2. Apply pending session if auth fired before post loaded
    if (pendingSession) {
      showOwnerUI(pendingSession, post);
      return;
    }

    // 3. Try getSession as final fallback
    const { data: { session } } = await sb.auth.getSession();
    if (session) showOwnerUI(session, post);
  }

  async function showOwnerUI(session, post) {
    // Always show logout pill
    document.getElementById('logout-pill').classList.add('visible');
    document.getElementById('pill-username').textContent = session.user.email;

    if (session.user.id === post.user_id) {
      document.getElementById('edit-toolbar').classList.add('visible');
      document.body.style.paddingTop = '36px';
    } else {
      const { data: myPost } = await sb.from('pages').select('username').eq('user_id', session.user.id).single();
      document.getElementById('visitor-bar').classList.add('visible');
      document.getElementById('visitorUsername').textContent = myPost?.username || session.user.email;
      const myPostLink = document.getElementById('myPostLink');
      if (myPost?.username) {
        myPostLink.onclick = () => window.location.href = '/' + myPost.username;
      } else {
        myPostLink.style.display = 'none';
      }
      document.body.style.paddingTop = '28px';
    }
  }

  async function signOut() {
    await sb.auth.signOut();
    window.location.reload();
  }

  function renderContent(content, displayName) {
    const root = document.getElementById('post-root');
    root.innerHTML = '';

    if (content.css) {
      const style = document.createElement('style');
      style.textContent = content.css;
      root.appendChild(style);
    }

    if (content.html) {
      const div = document.createElement('div');
      div.innerHTML = content.html;
      root.appendChild(div);
    }

    if (content.js) {
      const script = document.createElement('script');
      script.textContent = content.js;
      root.appendChild(script);
    }

    const nameEl = document.getElementById('post-username');
    if (nameEl) nameEl.textContent = displayName;
  }

  function buildCombinedDoc(content) {
    let doc = '';
    if (content.css) doc += `<style>\n${content.css}\n</style>\n`;
    doc += content.html || '';
    if (content.js) doc += `\n<script>\n${content.js}\n<\/script>`;
    return doc;
  }

  let previewDebounce = null;
  function updatePreview() {
    clearTimeout(previewDebounce);
    previewDebounce = setTimeout(() => {
      const frame = document.getElementById('preview-frame');
      if (frame) frame.srcdoc = document.getElementById('code-html').value;
    }, 300);
  }

  function showEditUI() {
    document.getElementById('edit-toolbar').classList.add('visible');
    document.getElementById('room-nav').classList.add('visible');
    buildRoomNav();
    document.body.style.paddingTop = '60px';
  }

  function buildRoomNav() {
    const nav = document.getElementById('room-nav');
    const base = '/' + username;
    let html = `<a class="room-tab ${!currentRoom ? 'active' : ''}" href="/${username}">Home</a>`;
    roomsData.forEach(r => {
      html += `<a class="room-tab ${currentRoom === r.room_name ? 'active' : ''}" href="${base}/${r.room_name}">${r.room_name}</a>`;
    });
    html += `<button class="room-tab-add" onclick="addRoom()">+ room</button>`;
    nav.innerHTML = html;
  }

  function exitEditMode() {
    document.getElementById('edit-toolbar').classList.remove('visible');
    document.getElementById('room-nav').classList.remove('visible');
    closeEditor();
    document.body.style.paddingTop = '';
  }

  function toggleEditor() {
    const panel = document.getElementById('editor-panel');
    if (panel.classList.contains('visible')) {
      closeEditor();
    } else {
      openEditor();
    }
  }

  function openEditor() {
    const combined = buildCombinedDoc(currentContent);
    const ta = document.getElementById('code-html');
    ta.value = combined;
    ta.addEventListener('input', updatePreview);
    document.getElementById('editor-panel').classList.add('visible');
    updatePreview();
    initDividerDrag();
  }

  function closeEditor() {
    const ta = document.getElementById('code-html');
    ta.removeEventListener('input', updatePreview);
    document.getElementById('editor-panel').classList.remove('visible');
  }

  function initDividerDrag() {
    const divider = document.getElementById('ed-divider');
    const split = document.getElementById('editor-split');
    const codePane = document.getElementById('editor-code');
    let dragging = false;
    divider.onmousedown = (e) => {
      dragging = true;
      e.preventDefault();
    };
    document.onmousemove = (e) => {
      if (!dragging) return;
      const rect = split.getBoundingClientRect();
      const pct = ((e.clientX - rect.left) / rect.width) * 100;
      codePane.style.width = Math.min(Math.max(pct, 20), 80) + '%';
    };
    document.onmouseup = () => { dragging = false; };
  }

  async function saveContent() {
    const status = document.getElementById('ed-status');
    status.textContent = 'Saving…';
    const html = document.getElementById('code-html').value;

    let error;
    if (currentRoom) {
      const res = await sb.from('rooms').update({ html, css: '', js: '', updated_at: new Date().toISOString() })
        .eq('username', username).eq('room_name', currentRoom);
      error = res.error;
    } else {
      const res = await sb.from('pages').update({ html, css: '', js: '', updated_at: new Date().toISOString() })
        .eq('username', username);
      error = res.error;
    }

    if (error) {
      status.textContent = 'Error saving.';
    } else {
      currentContent = { html, css: '', js: '' };
      renderContent(currentContent, postData.display_name || username);
      status.textContent = 'Saved ✓';
      setTimeout(() => status.textContent = '', 3000);
    }
  }

  async function addRoom() {
    const name = prompt('Room name (e.g. living-room, office, studio):');
    if (!name) return;
    const slug = name.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    if (!slug) return;

    const { data: { session } } = await sb.auth.getSession();
    const { error } = await sb.from('rooms').insert({
      user_id: session.user.id, username, room_name: slug, html: '', css: '', js: ''
    });
    if (error) { alert('Could not create room: ' + error.message); return; }
    window.location.href = '/' + username + '/' + slug;
  }

  function showNotFound() {
    document.getElementById('post-root').innerHTML = `
      <div class="state">
        <div class="state-title">This Post doesn't exist yet.</div>
        <p><strong>postmarq.org/${username}</strong> hasn't been claimed.</p>
        <a href="/"><button class="xp-btn">Claim it →</button></a>
      </div>`;
  }

  function showRoomNotFound() {
    document.getElementById('post-root').innerHTML = `
      <div class="state">
        <div class="state-title">Room not found.</div>
        <p><strong>postmarq.org/${username}/${currentRoom}</strong> doesn't exist yet.</p>
        <a href="/${username}"><button class="xp-btn">← Back to Post</button></a>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('post-root').innerHTML = `<div class="state"><div class="state-title">${msg}</div></div>`;
  }

  init();
</script>
</body>
</html>
