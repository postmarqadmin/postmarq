<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Postmarq</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Tahoma, Arial, sans-serif; background: #ECE9D8; min-height: 100vh; }

    /* ── Loading / error states ── */
    .state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100vh; gap: 1rem;
      font-size: 13px; color: #444;
    }
    .state-title { font-size: 16px; font-weight: bold; color: #0A246A; }
    .xp-btn {
      padding: 4px 16px; font-family: Tahoma, Arial, sans-serif; font-size: 11px;
      background: linear-gradient(180deg, #F8F6F2 0%, #ECE9D8 50%, #DDD9C8 100%);
      border: 2px solid; cursor: pointer;
      border-color: #fff #808080 #808080 #fff;
    }

    /* ── User Post renders here ── */
    #post-root { min-height: 100vh; }

    /* ── Edit mode toolbar ── */
    #edit-toolbar {
      display: none;
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: linear-gradient(180deg, #5896E8 0%, #1A54B2 50%, #2870D0 100%);
      border-bottom: 2px solid #1040A0;
      padding: 4px 10px; gap: 8px; align-items: center;
      font-family: Tahoma, Arial, sans-serif; font-size: 11px; color: white;
    }
    #edit-toolbar.visible { display: flex; }
    #edit-toolbar span { font-weight: bold; text-shadow: 0 1px 1px rgba(0,0,60,0.5); }
    .tb-btn {
      padding: 3px 10px; font-family: Tahoma, Arial, sans-serif; font-size: 11px;
      font-weight: bold; cursor: pointer;
      background: linear-gradient(180deg, #6AAAF8 0%, #2A68D0 50%, #3A78DC 100%);
      border: 2px solid; color: white;
      border-color: #8ABCFA #1040A0 #1040A0 #8ABCFA;
      text-shadow: 0 1px 1px rgba(0,0,60,0.5);
    }
    .tb-btn.danger {
      background: linear-gradient(180deg, #F87070 0%, #C83030 50%, #D84040 100%);
      border-color: #FA8888 #A02020 #A02020 #FA8888;
    }
    .tb-spacer { flex: 1; }
    .tb-status { font-size: 10px; opacity: 0.8; font-style: italic; }

    /* ── Code editor panel ── */
    #editor-panel {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 9998;
      height: 340px; background: #1E1E1E;
      border-top: 3px solid #1040A0;
      flex-direction: column;
    }
    #editor-panel.visible { display: flex; }
    .editor-tabs {
      display: flex; background: #2D2D2D;
      border-bottom: 1px solid #1040A0;
    }
    .editor-tab {
      padding: 5px 16px; font-size: 11px; font-family: Tahoma, Arial, sans-serif;
      color: #CCC; cursor: pointer; border-right: 1px solid #444;
    }
    .editor-tab.active { background: #1E1E1E; color: white; border-bottom: 2px solid #4A88E8; }
    .editor-panes { flex: 1; position: relative; }
    .editor-pane {
      display: none; width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }
    .editor-pane.active { display: block; }
    .editor-pane textarea {
      width: 100%; height: 100%; padding: 10px;
      background: #1E1E1E; color: #D4D4D4;
      font-family: 'Courier New', monospace; font-size: 12px;
      border: none; outline: none; resize: none; line-height: 1.6;
    }
  </style>
</head>
<body>

<!-- Edit toolbar (owner only) -->
<div id="edit-toolbar">
  <span>✏️ Edit Mode</span>
  <button class="tb-btn" onclick="toggleEditor()">Code Editor</button>
  <button class="tb-btn" onclick="savePost()">Save</button>
  <button class="tb-btn danger" onclick="exitEditMode()">Exit Edit</button>
  <div class="tb-spacer"></div>
  <span class="tb-status" id="saveStatus"></span>
  <span style="opacity:0.7">Viewing as: <strong id="viewingAs"></strong></span>
</div>

<!-- Post content -->
<div id="post-root"></div>

<!-- Code editor -->
<div id="editor-panel">
  <div class="editor-tabs">
    <div class="editor-tab active" onclick="switchTab('html')">HTML</div>
    <div class="editor-tab" onclick="switchTab('css')">CSS</div>
    <div class="editor-tab" onclick="switchTab('js')">JS</div>
  </div>
  <div class="editor-panes">
    <div class="editor-pane active" id="pane-html"><textarea id="code-html" placeholder="<!-- Your HTML here -->"></textarea></div>
    <div class="editor-pane" id="pane-css"><textarea id="code-css" placeholder="/* Your CSS here */"></textarea></div>
    <div class="editor-pane" id="pane-js"><textarea id="code-js" placeholder="// Your JS here"></textarea></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://vzvgqkxhhjubylojhohn.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_JFEpFZi63RZja2WorNkBdQ_L3E4mZ6q';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const DEFAULT_HTML = `
<style>
  body { font-family: Tahoma, Arial, sans-serif; background: #ECE9D8; margin: 0; padding: 2rem; }
  .post-header { max-width: 680px; margin: 0 auto 2rem; }
  .post-name { font-size: 28px; font-weight: bold; color: #0A246A; }
  .post-bio  { font-size: 13px; color: #555; margin-top: 0.4rem; }
  .post-card {
    max-width: 680px; margin: 0 auto; padding: 1.5rem;
    background: white; border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
    font-size: 13px; color: #333; line-height: 1.6;
  }
  .post-card h2 { font-size: 14px; color: #0A246A; margin-bottom: 0.75rem; }
  .stamp-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .stamp {
    padding: 4px 12px; font-size: 11px; cursor: pointer;
    background: #ECE9D8; border: 2px solid;
    border-color: #fff #808080 #808080 #fff;
  }
  .stamp:active { border-color: #808080 #fff #fff #808080; }
</style>
<div class="post-header">
  <div class="post-name" id="post-username">Your Post</div>
  <div class="post-bio">Welcome to my corner of the internet.</div>
</div>
<div class="post-card">
  <h2>Hello, neighbor.</h2>
  <p>This is my Post. It's a place I built, decorated, and share on my own terms.
  Edit this page to make it yours — paste in code from Claude, write it yourself, or remix it any way you like.</p>
  <div class="stamp-row">
    <button class="stamp">📮 Stamp</button>
    <button class="stamp">🔁 Loop</button>
  </div>
</div>`;

  let username = '';
  let postData = null;
  let isOwner = false;
  let editMode = false;

  async function init() {
    const host = window.location.hostname;
    // Extract username from subdomain
    const parts = host.split('.');
    if (parts.length < 3) {
      showError('No Post found at this address.');
      return;
    }
    username = parts[0];
    document.title = username + '.postmarq.org';

    // Fetch post from Supabase
    const { data, error } = await sb
      .from('posts')
      .select('*')
      .eq('username', username)
      .single();

    if (error || !data) {
      showNotFound();
      return;
    }

    postData = data;
    renderPost(data);

    // Check if logged-in user owns this Post
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user.id === data.user_id) {
      isOwner = true;
      enterEditMode();
    }
  }

  function renderPost(data) {
    const root = document.getElementById('post-root');
    const html = data.html || DEFAULT_HTML;
    const css  = data.css  || '';
    const js   = data.js   || '';

    let content = '';
    if (css) content += `<style>${css}</style>`;
    content += html;
    if (js)  content += `<script>${js}<\/script>`;
    root.innerHTML = content;

    // Inject display name if placeholder present
    const nameEl = document.getElementById('post-username');
    if (nameEl) nameEl.textContent = data.display_name || username;
  }

  function enterEditMode() {
    editMode = true;
    document.getElementById('edit-toolbar').classList.add('visible');
    document.getElementById('viewingAs').textContent = username + '.postmarq.org';
    document.getElementById('code-html').value = postData.html || DEFAULT_HTML;
    document.getElementById('code-css').value  = postData.css  || '';
    document.getElementById('code-js').value   = postData.js   || '';
    document.body.style.paddingTop = '36px';
  }

  function exitEditMode() {
    document.getElementById('edit-toolbar').classList.remove('visible');
    document.getElementById('editor-panel').classList.remove('visible');
    document.body.style.paddingTop = '';
    editMode = false;
  }

  function toggleEditor() {
    document.getElementById('editor-panel').classList.toggle('visible');
    document.body.style.paddingBottom =
      document.getElementById('editor-panel').classList.contains('visible') ? '340px' : '';
  }

  function switchTab(lang) {
    document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.editor-pane').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('pane-' + lang).classList.add('active');
  }

  async function savePost() {
    const status = document.getElementById('saveStatus');
    status.textContent = 'Saving…';
    const html = document.getElementById('code-html').value;
    const css  = document.getElementById('code-css').value;
    const js   = document.getElementById('code-js').value;

    const { error } = await sb.from('posts').update({
      html, css, js, updated_at: new Date().toISOString()
    }).eq('username', username);

    if (error) {
      status.textContent = 'Error saving.';
    } else {
      postData.html = html; postData.css = css; postData.js = js;
      renderPost(postData);
      status.textContent = 'Saved ✓';
      setTimeout(() => status.textContent = '', 3000);
    }
  }

  function showNotFound() {
    document.getElementById('post-root').innerHTML = `
      <div class="state">
        <div class="state-title">This Post doesn't exist yet.</div>
        <p><strong>${username}.postmarq.org</strong> hasn't been claimed.</p>
        <a href="https://postmarq.org"><button class="xp-btn">Claim it →</button></a>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('post-root').innerHTML = `
      <div class="state"><div class="state-title">${msg}</div></div>`;
  }

  init();
</script>
</body>
</html>
